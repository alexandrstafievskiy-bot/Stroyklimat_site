<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" fill="#07131f"/>
  <g transform="translate(60, 60)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#2f7de1" stroke-width="6"/>
    <!-- Diagonal line -->
    <line x1="-32" y1="32" x2="32" y2="-32" stroke="#2f7de1" stroke-width="6" stroke-linecap="round"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="#ffffff" stroke-width="4"/>
    <!-- Ventilation blades -->
    <g opacity="0.9">
      <line x1="-18" y1="-12" x2="-18" y2="12" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <line x1="18" y1="-12" x2="18" y2="12" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>
</svg>
