<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Background -->
  <rect width="200" height="280" fill="transparent"/>
  
  <!-- Circle with ventilation symbol -->
  <g transform="translate(100, 80)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="currentColor" stroke-width="8"/>
    <!-- Diagonal line (prohibition symbol) -->
    <line x1="-42" y1="42" x2="42" y2="-42" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="currentColor" stroke-width="6"/>
    <!-- Ventilation blades/slats -->
    <g opacity="0.9">
      <path d="M -25,-15 L -25,15" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      <path d="M 0,-20 L 0,20" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      <path d="M 25,-15 L 25,15" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- VENT text -->
  <text x="100" y="200" font-family="'Arial Black', Arial, sans-serif" font-size="48" font-weight="900" 
        fill="currentColor" text-anchor="middle" letter-spacing="3">VENT</text>
  
  <!-- SOLUTIONS text -->
  <text x="100" y="235" font-family="Arial, sans-serif" font-size="22" font-weight="400" 
        fill="currentColor" text-anchor="middle" letter-spacing="6">SOLUTIONS</text>
</svg>
