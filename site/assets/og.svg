<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07131f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Logo -->
  <g transform="translate(300, 315)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#2f7de1" stroke-width="12"/>
    <!-- Diagonal line -->
    <line x1="-85" y1="85" x2="85" y2="-85" stroke="#2f7de1" stroke-width="12" stroke-linecap="round"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#ffffff" stroke-width="10"/>
    <!-- Ventilation blades -->
    <g opacity="0.9">
      <line x1="-45" y1="-30" x2="-45" y2="30" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
      <line x1="0" y1="-40" x2="0" y2="40" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
      <line x1="45" y1="-30" x2="45" y2="30" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Company name -->
  <text x="550" y="250" font-family="'Arial Black', Arial, sans-serif" font-size="72" font-weight="900" 
        fill="#ffffff" letter-spacing="2">STROYKLIMAT</text>
  <text x="550" y="310" font-family="Arial, sans-serif" font-size="36" 
        fill="#2f7de1" letter-spacing="1">ТОВ "Бис 7"</text>
  
  <!-- Tagline -->
  <text x="550" y="380" font-family="Arial, sans-serif" font-size="28" 
        fill="#ffffff" opacity="0.9">Професійні системи вентиляції</text>
  <text x="550" y="420" font-family="Arial, sans-serif" font-size="28" 
        fill="#ffffff" opacity="0.9">та кондиціонування</text>
</svg>
