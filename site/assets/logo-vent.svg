<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Circle with ventilation symbol -->
  <g transform="translate(100, 80)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="white" stroke-width="8"/>
    <!-- Diagonal line -->
    <line x1="-42" y1="42" x2="42" y2="-42" stroke="white" stroke-width="8"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="white" stroke-width="6"/>
    <!-- Ventilation blades -->
    <path d="M -25,-15 Q -10,-5 -25,15 M 0,-20 Q 15,-10 0,20 M 25,-15 Q 10,-5 25,15" 
          fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- VENT text -->
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="white" text-anchor="middle" letter-spacing="2">VENT</text>
  <!-- SOLUTIONS text -->
  <text x="100" y="230" font-family="Arial, sans-serif" font-size="24" font-weight="300" 
        fill="white" text-anchor="middle" letter-spacing="4">SOLUTIONS</text>
</svg>
