<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Каталог — STROYKLIMAT</title>
  <meta name="description" content="Каталог товарів та послуг STROYKLIMAT (ТОВ 'Бис 7'). Пошук, фільтри, сортування, обране та кошик.">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="topbar-inner">
        <a class="brand" href="./index.html" aria-label="STROYKLIMAT">
          <div class="logo"><img src="./assets/logo.svg" alt="STROYKLIMAT"></div>
          <div class="name">
            <strong>STROYKLIMAT</strong>
            <span>ТОВ "Бис 7"</span>
          </div>
        </a>

        <form class="search" data-search-form>
          <input data-search-input id="searchInput" placeholder="Пошук товарів… (назва, модель, ключові слова)">
          <button type="submit">Пошук</button>
        </form>

        <nav class="actions">
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Переключить тему">🌙</button>
          <a class="pill" href="./favorites.html">Обране <b data-fav-count>0</b></a>
          <a class="pill" href="./cart.html">Кошик <b data-cart-count>0</b></a>
        </nav>
      </div>

      <div class="navline">
        <div class="nav">
          <a class="chip active" href="./catalog.html">Каталог</a>
          <a class="chip" href="./about.html">Про нас</a>
          <a class="chip" href="./delivery.html">Доставка і оплата</a>
          <a class="chip" href="./testimonials.html">⭐ Відгуки</a>
          <a class="chip" href="./returns.html">Повернення</a>
          <a class="chip" href="./contacts.html">Контакти</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container catalog-layout">
    <aside class="sidebar">
      <div class="side-block">
        <div class="side-title">Категорії</div>
        <input id="catSearch" class="side-input" placeholder="Пошук категорії…">
        <div id="catsList" class="cats-list" aria-label="Список категорій"></div>
      </div>

      <div class="side-block">
        <div class="side-title">Фільтри</div>

        <label class="check">
          <input type="checkbox" id="inStockOnly">
          <span>Тільки “В наявності”</span>
        </label>

        <div class="range">
          <div class="range-row">
            <label class="ctrl2">
              <span>Ціна від</span>
              <input id="minPrice" inputmode="numeric" placeholder="0">
            </label>
            <label class="ctrl2">
              <span>Ціна до</span>
              <input id="maxPrice" inputmode="numeric" placeholder="∞">
            </label>
          </div>
        </div>

        <label class="check">
          <input type="checkbox" id="hideZeroPrice">
          <span>Приховати “Ціну уточнюйте”</span>
        </label>

        <button class="btn btn-ghost" id="resetFilters" type="button">Скинути фільтри</button>
      </div>
    </aside>

    <section class="content">
      <div class="catalog-header">
        <div class="left">
          <h1>Каталог</h1>
          <div class="muted" id="activeInfo"></div>
        </div>

        <div class="right controls">
          <button class="btn" id="refreshCatalog" style="display: none; margin-right: 10px;" title="Оновити каталог">
            🔄 <span id="refreshText">Оновити</span>
          </button>
          <label class="ctrl">
            <span>Сортування</span>
            <select id="sortSelect">
              <option value="recommended">Рекомендовані</option>
              <option value="price_asc">Ціна: зростання</option>
              <option value="price_desc">Ціна: спадання</option>
              <option value="title_asc">Назва: A→Я</option>
              <option value="title_desc">Назва: Я→A</option>
              <option value="newest">Новіші</option>
            </select>
          </label>

          <label class="ctrl">
            <span>Товарів на сторінці</span>
            <select id="pageSizeSelect">
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </label>
        </div>
      </div>

      <div class="chips-wrap">
        <div id="categoriesBar" class="chips" aria-label="Швидкі категорії"></div>
      </div>

      <div id="skeleton" class="grid skeleton"></div>
      <div id="grid" class="grid" hidden></div>

      <div class="pager">
        <button id="prevBtn" class="btn">← Назад</button>
        <div id="pageInfo" class="muted">Сторінка 1</div>
        <button id="nextBtn" class="btn">Далі →</button>
      </div>
    </section>
  </main>
  <script src="./js/store.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/catalog.js"></script>

</body>
</html>
